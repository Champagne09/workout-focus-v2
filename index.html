<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Workout Focus — Cam</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout Focus">
<link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────── */
:root {
  --bg:        #0a0a0a;
  --surface:   #111111;
  --surface2:  #1a1a1a;
  --surface3:  #222222;
  --border:    #2a2a2a;
  --border2:   #333333;
  --text:      #ffffff;
  --text2:     #cccccc;
  --muted:     #888888;
  --green:     #3A6B35;
  --green2:    #4E8B47;
  --green3:    #2A4F26;
  --green-dim: rgba(58,107,53,0.15);
  --green-glow:rgba(58,107,53,0.3);
  --amber:     #C8891A;
  --red:       #C0392B;
  --radius:    12px;
  --radius-sm: 8px;
  --shadow:    0 4px 24px rgba(0,0,0,0.6);
  --nav-h:     60px;
  --sidebar-w: 220px;
  --font:      'Inter', system-ui, sans-serif;
  --mono:      'JetBrains Mono', monospace;
}

/* ── RESET ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
input, select, textarea { font-family: var(--font); }
a { color: inherit; text-decoration: none; }
ul, ol { list-style: none; }

/* ── FOCUS / ACCESSIBILITY ──────────────────────── */
:focus-visible {
  outline: 2px solid var(--green2);
  outline-offset: 3px;
  border-radius: 4px;
}
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ── LAYOUT ─────────────────────────────────────── */
#root { display: flex; min-height: 100vh; }

.app-shell {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* Desktop sidebar nav */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  z-index: 100;
  padding: 24px 0 16px;
}

.sidebar-logo {
  padding: 0 20px 28px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.sidebar-logo h1 {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
}
.sidebar-logo span {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-list { display: flex; flex-direction: column; gap: 4px; padding: 0 12px; flex: 1; }

.nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 12px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  width: 100%;
  text-align: left;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active {
  background: var(--green-dim);
  color: var(--green2);
  font-weight: 600;
  border: 1px solid var(--green-glow);
}
.nav-icon { width: 22px; text-align: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

.sidebar-footer {
  padding: 16px 20px 0;
  border-top: 1px solid var(--border);
  margin-top: auto;
}
.sidebar-date {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
}

/* Main content */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  padding: 32px;
  max-width: calc(100vw - var(--sidebar-w));
}

/* ── PAGE HEADER ─────────────────────────────────── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
  gap: 16px;
}
.page-title {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}
.page-sub {
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── CARDS ──────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 12px;
}
.card-value {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  font-family: var(--mono);
}
.card-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}
.card-green { border-color: var(--green3); background: linear-gradient(135deg, var(--surface) 0%, rgba(58,107,53,0.08) 100%); }

/* ── GRID ────────────────────────────────────────── */
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

/* ── PROGRESS BAR ───────────────────────────────── */
.prog-wrap { display: flex; flex-direction: column; gap: 6px; }
.prog-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); }
.prog-track {
  height: 6px;
  background: var(--surface3);
  border-radius: 99px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: var(--green);
  border-radius: 99px;
  transition: width 0.4s ease;
}
.prog-fill.amber { background: var(--amber); }
.prog-fill.red   { background: var(--red);   }

/* ── BADGES ─────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.badge-green { background: var(--green-dim); color: var(--green2); border: 1px solid var(--green3); }
.badge-amber { background: rgba(200,137,26,0.12); color: var(--amber); border: 1px solid rgba(200,137,26,0.3); }
.badge-red   { background: rgba(192,57,43,0.12);  color: #E74C3C;     border: 1px solid rgba(192,57,43,0.3); }
.badge-gray  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

/* ── BUTTONS ────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600;
  transition: background 0.15s, transform 0.1s;
  cursor: pointer;
  color: var(--text);
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green2); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--surface3); }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.btn-danger { background: rgba(192,57,43,0.15); color: #E74C3C; border: 1px solid rgba(192,57,43,0.3); }
.btn-danger:hover { background: rgba(192,57,43,0.25); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-lg { padding: 13px 24px; font-size: 15px; }
.btn-full { width: 100%; }

/* ── FORMS ──────────────────────────────────────── */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  width: 100%;
  transition: border-color 0.15s;
}
.form-input:focus { outline: none; border-color: var(--green); }
.form-input::placeholder { color: var(--muted); }
select.form-input { cursor: pointer; }
select.form-input option { background: var(--surface2); }

/* ── DIVIDER ─────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* ── SECTION HEADER ─────────────────────────────── */
.sec-hdr {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.sec-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); white-space: nowrap; }
.sec-line { flex: 1; height: 1px; background: var(--border); }

/* ── STAT ROW ────────────────────────────────────── */
.stat-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 14px; color: var(--text2); }
.stat-val { font-size: 14px; font-weight: 700; font-family: var(--mono); color: var(--text); }

/* ── HOME HERO ──────────────────────────────────── */
.home-hero {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius);
  padding: 32px 28px;
  margin-bottom: 28px;
  background: linear-gradient(135deg, #0c1a0c 0%, #111111 50%, #0a0a0a 100%);
  border: 1px solid var(--border2);
}
.home-hero::before {
  content: '';
  position: absolute;
  top: -80px; right: -60px;
  width: 380px; height: 380px;
  background: radial-gradient(circle, rgba(58,107,53,0.2) 0%, transparent 65%);
  pointer-events: none;
}
.home-hero::after {
  content: '';
  position: absolute;
  bottom: -50px; left: 0%;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(78,139,71,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero-inner {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.hero-greeting {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.8px;
  color: var(--text);
  line-height: 1.1;
}
.hero-date { font-size: 13px; color: var(--muted); margin-top: 4px; }
.streak-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(58,107,53,0.4), rgba(78,139,71,0.18));
  border: 1px solid rgba(78,139,71,0.5);
  border-radius: 999px;
  padding: 8px 18px 8px 10px;
  margin-top: 16px;
  box-shadow: 0 0 20px rgba(58,107,53,0.2);
}
.streak-num-pill {
  font-size: 28px;
  font-weight: 900;
  color: var(--green2);
  font-family: var(--mono);
  line-height: 1;
  min-width: 28px;
  text-align: center;
}
.streak-label { font-size: 12px; font-weight: 700; color: var(--text); }
.streak-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
.hero-actions {
  margin-top: 22px;
  position: relative;
  z-index: 1;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.today-split-chip {
  background: rgba(58,107,53,0.15);
  border: 1px solid rgba(78,139,71,0.3);
  border-radius: var(--radius);
  padding: 16px 20px;
  min-width: 210px;
  flex-shrink: 0;
}
.split-day-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--green2);
  margin-bottom: 6px;
}
.split-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
}
.split-focus { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* Stat cards with accent bar */
.stat-card-accent {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s;
}
.stat-card-accent:hover { border-color: var(--border2); border-left-color: var(--green2); }

/* Program card on home */
.program-card {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(58,107,53,0.07) 100%);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}
.program-exercises {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 14px;
}
.program-ex-tag {
  padding: 5px 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
}

/* Recovery grid items */
.recovery-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 12px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  transition: border-color 0.15s;
}
.recovery-item.fresh    { border: 1px solid rgba(58,107,53,0.35); }
.recovery-item.moderate { border: 1px solid rgba(200,137,26,0.25); }
.recovery-item.sore     { border: 1px solid rgba(192,57,43,0.35); }
.recovery-item.none     { border: 1px solid var(--border); }

/* ── WORKOUT ─────────────────────────────────────── */
.exercise-lib {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.ex-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  gap: 8px;
  color: var(--text2);
}
.ex-item:hover { border-color: var(--green3); background: var(--green-dim); }
.ex-item.selected { border-color: var(--green); background: var(--green-dim); color: var(--green2); font-weight: 600; }

.session-builder {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.session-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
}

.set-row {
  display: grid;
  grid-template-columns: 40px 1fr 1fr 1fr 40px;
  gap: 8px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.set-row:last-child { border-bottom: none; }
.set-num {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--muted);
  text-align: center;
}

.muscle-tag {
  display: inline-flex;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: var(--surface3);
  color: var(--muted);
  border: 1px solid var(--border);
}

/* ── NUTRITION ──────────────────────────────────── */
.macro-ring-wrap {
  position: relative;
  width: 140px;
  height: 140px;
  flex-shrink: 0;
}
.macro-ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.macro-cal { font-size: 22px; font-weight: 800; font-family: var(--mono); color: var(--text); }
.macro-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }

.macro-legend {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.macro-leg-row { display: flex; align-items: center; gap: 10px; }
.macro-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.macro-leg-label { font-size: 13px; color: var(--text2); flex: 1; }
.macro-leg-val { font-size: 13px; font-weight: 700; font-family: var(--mono); color: var(--text); }

.meal-section { margin-bottom: 24px; }
.meal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface2);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
}
.meal-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); }
.meal-cals  { font-size: 12px; font-family: var(--mono); color: var(--green2); }

.meal-body {
  border: 1px solid var(--border);
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  overflow: hidden;
}
.meal-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  gap: 12px;
}
.meal-item:last-child { border-bottom: none; }
.meal-item-name { color: var(--text); flex: 1; }
.meal-item-macros { display: flex; gap: 12px; }
.meal-macro { font-family: var(--mono); font-size: 11px; color: var(--muted); }

.water-tracker {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.water-cup {
  width: 42px; height: 52px;
  border: 2px solid var(--border2);
  border-radius: 4px 4px 8px 8px;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.15s;
  background: var(--surface2);
}
.water-cup:hover { border-color: var(--green); }
.water-cup.filled { border-color: var(--green); }
.water-fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, var(--green), var(--green2));
  transition: height 0.3s ease;
}

/* ── MUSCLE MAP ─────────────────────────────────── */
.body-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.body-toggle button {
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}
.body-toggle button.active {
  background: var(--green-dim);
  color: var(--green2);
  border-color: var(--green3);
}

.body-diagram-wrap {
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.muscle-legend {
  display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap;
}
.muscle-leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.muscle-leg-dot { width: 12px; height: 12px; border-radius: 3px; }

.muscle-detail-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

/* ── INTENSITY METER ─────────────────────────────── */
.intensity-meter {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  margin-bottom: 8px;
}
.intensity-info { flex: 1; }
.intensity-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.intensity-name { font-size: 15px; font-weight: 800; color: var(--text); margin-top: 2px; }
.intensity-bars { display: flex; gap: 3px; }
.intensity-bar {
  width: 10px; height: 28px;
  border-radius: 3px;
  background: var(--surface3);
  border: 1px solid var(--border);
  transition: background 0.2s, border-color 0.2s;
}
.intensity-bar.filled { border-color: transparent; }

/* ── EXERCISE PICKER ─────────────────────────────── */
.ex-picker-grid {
  display: flex;
  flex-wrap: wrap;

/* ── REDUCER ───────────────────────────────────────── */
function reducer(state, action) {
  switch(action.type) {
    case 'SET_TAB': return { ...state, tab: action.tab };
    case 'SET_PENDING_SESSION': return { ...state, pendingSession: action.session };
    case 'CLEAR_PENDING_SESSION': return { ...state, pendingSession: null };
    case 'SET_REST_PREF': return { ...state, restPrefSec: action.seconds };
    case 'TOGGLE_GYM_MODE': return { ...state, gymMode: !state.gymMode };
    case 'SAVE_CUSTOM_FOOD': return { ...state, customFoods: [...(state.customFoods||[]), action.food] };
    case 'DELETE_CUSTOM_FOOD': return { ...state, customFoods: (state.customFoods||[]).filter((_,i)=>i!==action.idx) };

    case 'START_SESSION': {
      const session = {
        id: Date.now(),
        date: TODAY,
        name: action.name,
        exercises: action.exercises.map(name => ({
          name,
          muscle: action.muscleGroup,
          sets: [{ reps:'', weight:'', done: false }]
        })),
        startTime: Date.now(),
        complete: false,
      };
      return { ...state, activeSession: session };
    }
    case 'ADD_SET': {
      if (!state.activeSession) return state;
      const exs = state.activeSession.exercises.map((ex, i) =>
        i === action.exIdx
          ? { ...ex, sets: [...ex.sets, { reps:'', weight:'', done: false }] }
          : ex
      );
      return { ...state, activeSession: { ...state.activeSession, exercises: exs } };
    }
    case 'UPDATE_SET': {
      if (!state.activeSession) return state;
      const exs = state.activeSession.exercises.map((ex, i) =>
        i === action.exIdx
          ? { ...ex, sets: ex.sets.map((s, j) => j === action.setIdx ? { ...s, [action.field]: action.value } : s) }
          : ex
      );
      return { ...state, activeSession: { ...state.activeSession, exercises: exs } };
    }
    case 'COMPLETE_SESSION': {
      if (!state.activeSession) return state;
      const session = { ...state.activeSession, complete: true, endTime: Date.now() };
      const muscleLog = { ...state.muscleLog };
      session.exercises.forEach(ex => {
        if (ex.muscle) {
          const prev = muscleLog[ex.muscle];
          const prevExs = (prev && typeof prev === 'object') ? prev.exercises : [];
          const exs = ex.name ? [...new Set([...prevExs, ex.name])] : prevExs;
          muscleLog[ex.muscle] = { date: TODAY, exercises: exs, intensity: Math.min(5, exs.length || 1) };
        }
      });
      const strengthLog = { ...state.strengthLog };
      session.exercises.forEach(ex => {
        const prs = ex.sets.filter(s => s.weight && s.reps).map(s => ({ date: TODAY, weight: parseFloat(s.weight), reps: parseInt(s.reps) }));
        if (prs.length) strengthLog[ex.name] = [...(strengthLog[ex.name]||[]), ...prs];
      });
      return { ...state, sessions: [session, ...state.sessions], activeSession: null, muscleLog, strengthLog };
    }
    case 'DISCARD_SESSION': return { ...state, activeSession: null };

    case 'LOG_MEAL': {
      const dayLog = state.mealLog[TODAY] || { breakfast:[], lunch:[], dinner:[], snacks:[] };
      const updated = { ...dayLog, [action.meal]: [...dayLog[action.meal], action.item] };
      return { ...state, mealLog: { ...state.mealLog, [TODAY]: updated } };
    }
    case 'REMOVE_MEAL': {
      const dayLog = state.mealLog[TODAY];
      if (!dayLog) return state;
      const updated = { ...dayLog, [action.meal]: dayLog[action.meal].filter((_,i) => i !== action.idx) };
      return { ...state, mealLog: { ...state.mealLog, [TODAY]: updated } };
    }
    case 'SET_WATER': {
      return { ...state, waterLog: { ...state.waterLog, [TODAY]: action.cups } };
    }
    case 'SET_NUTRITION_GOALS': return { ...state, nutritionGoals: action.goals };

    case 'TRAIN_MUSCLE': return { ...state, muscleLog: { ...state.muscleLog, [action.id]: { date: TODAY, exercises: action.exercises || [], intensity: action.intensity || 1 } } };
    case 'UNTRAIN_MUSCLE': { const { [action.id]: _removed, ...restLog } = state.muscleLog; return { ...state, muscleLog: restLog }; }

    case 'LOG_WEIGHT': return { ...state, weightLog: [...state.weightLog, { date: TODAY, weight: action.weight }] };
    case 'LOG_MEASUREMENT': return { ...state, measurements: [...state.measurements, { date: TODAY, ...action.data }] };
    case 'SET_GOALS': return { ...state, goals: { ...state.goals, ...action.goals } };
    case 'IMPORT_DATA': {
      const s = action.payload;
      return {
        ...state,
        sessions:       Array.isArray(s.sessions)       ? s.sessions       : state.sessions,
        muscleLog:      s.muscleLog  && typeof s.muscleLog  === 'object' ? s.muscleLog  : state.muscleLog,
        strengthLog:    s.strengthLog && typeof s.strengthLog=== 'object' ? s.strengthLog: state.strengthLog,
        mealLog:        s.mealLog    && typeof s.mealLog    === 'object' ? s.mealLog    : state.mealLog,
        waterLog:       s.waterLog   && typeof s.waterLog   === 'object' ? s.waterLog   : state.waterLog,
        weightLog:      Array.isArray(s.weightLog)      ? s.weightLog      : state.weightLog,
        measurements:   Array.isArray(s.measurements)   ? s.measurements   : state.measurements,
        nutritionGoals: s.nutritionGoals ? { ...state.nutritionGoals, ...s.nutritionGoals } : state.nutritionGoals,
        goals:          s.goals          ? { ...state.goals,          ...s.goals          } : state.goals,
      };
    }

    default: return state;
  }
}

const getMuscleDate      = (e) => !e ? null : (typeof e === 'string' ? e : e.date);
const getMuscleExercises = (e) => (e && typeof e === 'object' && e.exercises) ? e.exercises : [];
const getMuscleIntensity = (e) => (e && typeof e === 'object' && e.intensity) ? e.intensity : (e ? 1 : 0);

const getRecovery = (entry) => {
  const lastTrained = getMuscleDate(entry);
  if (!lastTrained) return 'none';
  const days = Math.floor((new Date(TODAY) - new Date(lastTrained)) / 86400000);
  if (days === 0) return 'sore';
  if (days === 1) return 'moderate';
  return 'fresh';
};

/* ── STRENGTH HELPERS ───────────────────────────────── */
const getLastBestSet = (strengthLog, exerciseName) => {
  const log = (strengthLog || {})[exerciseName] || [];
  if (!log.length) return null;
  // Group by date, find latest date, return heaviest set from that date
  const byDate = log.reduce((m, s) => { (m[s.date] = m[s.date] || []).push(s); return m; }, {});
  const dates = Object.keys(byDate).sort();
  const latest = dates[dates.length-1];
  const sets = byDate[latest];
  return sets.reduce((best, s) => (!best || s.weight > best.weight) ? s : best, null);
};
const getAllTimePR = (strengthLog, exerciseName) => {
  const log = (strengthLog || {})[exerciseName] || [];
  if (!log.length) return null;
  return log.reduce((best, s) => (!best || s.weight > best.weight) ? s : best, null);
};
const suggestNextWeight = (last) => {
  if (!last || !last.weight) return null;
  const reps = parseInt(last.reps) || 0;
  // If they hit 8+ reps last time, suggest +5lb. Otherwise stay.
  if (reps >= 8) return Math.round((last.weight + 5) * 2) / 2;
  return last.weight;
};

/* ── ACHIEVEMENTS ──────────────────────────────────── */
const computeAchievements = (state) => {
  const sessions = state.sessions || [];
  const log = state.strengthLog || {};
  const badges = [];
  // Session-based
  if (sessions.length >= 1)   badges.push({ id:'first-session', label:'First Session', type:'session', value:'1',   color:'#4E8B47' });
  if (sessions.length >= 10)  badges.push({ id:'10-sessions',   label:'10 Sessions',   type:'session', value:'10',  color:'#E07520' });
  if (sessions.length >= 25)  badges.push({ id:'25-sessions',   label:'25 Sessions',   type:'session', value:'25',  color:'#2A6FBA' });
  if (sessions.length >= 50)  badges.push({ id:'50-sessions',   label:'50 Sessions',   type:'session', value:'50',  color:'#C8891A' });
  if (sessions.length >= 100) badges.push({ id:'100-sessions',  label:'Century Club',  type:'session', value:'100', color:'#9B30FF' });
  // Volume-based
  const totalSets = sessions.reduce((a,s)=>a + s.exercises.reduce((b,e)=>b+e.sets.length,0), 0);
  if (totalSets >= 100)  badges.push({ id:'100-sets',  label:'100 Sets',   type:'volume', value:'100',  color:'#4E8B47' });
  if (totalSets >= 500)  badges.push({ id:'500-sets',  label:'500 Sets',   type:'volume', value:'500',  color:'#2A6FBA' });
  if (totalSets >= 1000) badges.push({ id:'1000-sets', label:'1,000 Sets', type:'volume', value:'1K',   color:'#E07520' });
  // Strength PRs
  const benchPR = (getAllTimePR(log, 'Bench Press')||{}).weight || 0;
  if (benchPR >= 135) badges.push({ id:'bench-135', label:'135 lb Bench', type:'strength', value:'135', color:'#4E8B47' });
  if (benchPR >= 185) badges.push({ id:'bench-185', label:'185 lb Bench', type:'strength', value:'185', color:'#C8891A' });
  if (benchPR >= 225) badges.push({ id:'bench-225', label:'2 Plate Bench', type:'strength', value:'225', color:'#E74C3C' });
  const squatPR = (getAllTimePR(log, 'Back Squat')||{}).weight || 0;
  if (squatPR >= 225) badges.push({ id:'squat-225', label:'225 lb Squat', type:'strength', value:'225', color:'#4E8B47' });
  if (squatPR >= 315) badges.push({ id:'squat-315', label:'3 Plate Squat', type:'strength', value:'315', color:'#C8891A' });
  const dlPR = (getAllTimePR(log, 'Deadlift')||{}).weight || 0;
  if (dlPR >= 315) badges.push({ id:'dl-315', label:'3 Plate Deadlift', type:'strength', value:'315', color:'#4E8B47' });
  if (dlPR >= 405) badges.push({ id:'dl-405', label:'4 Plate Deadlift', type:'strength', value:'405', color:'#C8891A' });
  // Streak
  const dates = [...new Set(sessions.map(s=>s.date))].sort();
  if (dates.length >= 7)  badges.push({ id:'streak-7',  label:'7-Day Active',  type:'streak', value:'7',  color:'#4E8B47' });
  if (dates.length >= 30) badges.push({ id:'streak-30', label:'30-Day Active', type:'streak', value:'30', color:'#C8891A' });
  return badges;
};

const sumMacros = (meals) => {
  const all = Object.values(meals || {}).flat();
  return all.reduce((acc, item) => ({
    cal: acc.cal + (item.cal||0),
    p:   acc.p   + (item.p  ||0),
    c:   acc.c   + (item.c  ||0),
    f:   acc.f   + (item.f  ||0),
  }), { cal:0, p:0, c:0, f:0 });
};

function ProgressBar({ val, max, color='', label='', sublabel='' }) {
  const pct = Math.min(100, max > 0 ? Math.round((val/max)*100) : 0);
  const cls = pct > 100 ? 'red' : pct > 85 ? 'amber' : '';
  return (
    <div className="prog-wrap">
      {label && <div className="prog-label"><span>{label}</span><span style={{fontFamily:'var(--mono)',fontSize:12}}>{val}<span style={{color:'var(--muted)'}}>/{max}</span></span></div>}
      <div className="prog-track">
        <div className={`prog-fill ${color||cls}`} style={{width:`${pct}%`}}/>
      </div>
      {sublabel && <div style={{fontSize:11,color:'var(--muted)'}}>{sublabel}</div>}
    </div>
  );
}

function Modal({ title, onClose, children, footer }) {
  useEffect(() => {
    const esc = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', esc);
    return () => document.removeEventListener('keydown', esc);
  }, [onClose]);
  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }} role="dialog" aria-modal="true" aria-label={title}>
      <div className="modal">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div className="modal-title">{title}</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose} aria-label="Close" style={{color:'var(--muted)',fontSize:16}}>x</button>
        </div>
        {children}
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

/* ── REST TIMER — floating pill ─────────────────────── */
function RestTimer({ seconds, onClose, onChangePref }) {
  const [remaining, setRemaining] = useState(seconds);
  const audioRef = useRef(null);
  useEffect(() => { setRemaining(seconds); }, [seconds]);
  useEffect(() => {
    if (remaining <= 0) {
      // Beep + vibrate when zero hit
      try { if (navigator.vibrate) navigator.vibrate([180, 80, 180]); } catch {}
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.frequency.value = 880; osc.connect(gain); gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(); osc.stop(ctx.currentTime + 0.5);
      } catch {}
      return;
    }
    const t = setTimeout(() => setRemaining(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [remaining]);
  const pct = Math.max(0, Math.min(100, (remaining / seconds) * 100));
  const done = remaining <= 0;
  const mm = String(Math.floor(Math.max(0,remaining)/60)).padStart(1,'0');
  const ss = String(Math.max(0,remaining)%60).padStart(2,'0');
  return (
    <div className={`rest-timer ${done?'done':''}`} role="status" aria-live="polite">
      <div className="rest-timer-ring">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="4"/>
          <circle cx="28" cy="28" r="24" fill="none" stroke={done?'#E07520':'#4E8B47'} strokeWidth="4" strokeLinecap="round"
                  strokeDasharray={2*Math.PI*24} strokeDashoffset={2*Math.PI*24*(1-pct/100)}
                  transform="rotate(-90 28 28)" style={{transition:'stroke-dashoffset 0.9s linear'}}/>
        </svg>
        <div className="rest-timer-time">{done ? 'GO' : `${mm}:${ss}`}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:4,flex:1,minWidth:0}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:done?'#E07520':'var(--green2)'}}>{done?'Rest done':'Resting'}</div>
        <div style={{display:'flex',gap:6}}>
          {[60,90,120,180].map(s => (
            <button key={s} className={`rest-chip ${seconds===s?'active':''}`} onClick={()=>onChangePref(s)}>{s/60}:{s%60===0?'00':s%60}</button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setRemaining(seconds)} style={{padding:'4px 10px',fontSize:11,letterSpacing:1}}>RESET</button>
        <button className="btn btn-ghost btn-sm" onClick={onClose} style={{padding:'4px 10px',fontSize:11,color:'var(--muted)',letterSpacing:1}}>CLOSE</button>
      </div>
    </div>
  );
}

/* ── VOICE INPUT — Web Speech API ──────────────────── */
function VoiceButton({ onResult, disabled }) {
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);
  const supported = typeof window !== 'undefined' &&
    (window.SpeechRecognition || window.webkitSpeechRecognition);
  if (!supported) return null;
  const start = () => {
    if (listening) { try { recRef.current?.stop(); } catch {}; return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR();
    r.lang = 'en-US';
    r.interimResults = false;
    r.maxAlternatives = 1;
    r.onresult = (e) => {
      const t = (e.results[0][0].transcript || '').toLowerCase().trim();
      // Parse: "log 95 by 8" / "log ninety-five by eight" / "95 for 8" / "95 by 8"
      const num = (w) => { const map={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,fifteen:15,twenty:20,thirty:30,forty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90,hundred:100}; const n=parseFloat(w); return isNaN(n)?(map[w]||null):n; };
      const cleaned = t.replace(/-/g,' ').replace(/\b(at|of|pounds?|lbs?|reps?|times)\b/g,' ').replace(/\s+/g,' ').trim();
      const tokens = cleaned.split(' ');
      const nums = tokens.map(num).filter(n => n !== null);
      if (nums.length >= 2) onResult({ weight: nums[0], reps: nums[1], transcript: t });
      else if (nums.length === 1) onResult({ weight: nums[0], reps: null, transcript: t });
      else onResult({ transcript: t, error: 'Could not parse — try "95 by 8"' });
    };
    r.onerror = () => setListening(false);
    r.onend = () => setListening(false);
    recRef.current = r;
    r.start();
    setListening(true);
  };
  return (
    <button className={`voice-btn ${listening?'listening':''}`} onClick={start} disabled={disabled} aria-label="Voice log a set" title='Voice: say "95 by 8"'>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  );
}

/* ── EXERCISE HISTORY MODAL — chart of weight × date ── */
function ExerciseHistoryModal({ exerciseName, strengthLog, onClose }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const data = (strengthLog || {})[exerciseName] || [];
  // Group by date — take heaviest set per day
  const byDate = data.reduce((m, s) => {
    if (!m[s.date] || s.weight > m[s.date].weight) m[s.date] = s;
    return m;
  }, {});
  const sorted = Object.values(byDate).sort((a,b) => a.date.localeCompare(b.date));
  const pr = data.reduce((best, s) => (!best || s.weight > best.weight) ? s : best, null);

  useEffect(() => {
    if (!canvasRef.current || !sorted.length) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        labels: sorted.map(s => s.date.slice(5)),
        datasets: [{
          label: 'Top set weight (lbs)',
          data: sorted.map(s => s.weight),
          borderColor: '#4E8B47',
          backgroundColor: 'rgba(78,139,71,0.15)',
          borderWidth: 2.5,
          pointBackgroundColor: '#72A84E',
          pointRadius: 4,
          tension: 0.25,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#8a8a8a', font:{size:10} }, grid: { color:'rgba(0,0,0,0.04)' } },
          y: { ticks: { color: '#8a8a8a', font:{size:10} }, grid: { color:'rgba(0,0,0,0.04)' } },
        }
      }
    });
    return () => chartRef.current?.destroy();
  }, [exerciseName]);

  return (
    <Modal title={`History — ${exerciseName}`} onClose={onClose}>
      {sorted.length === 0 ? (
        <div style={{padding:'30px 0',textAlign:'center',color:'var(--muted)'}}>No logged sets yet for this exercise.</div>
      ) : (
        <>
          <div className="grid-3" style={{marginBottom:16}}>
            <div className="card" style={{padding:12}}>
              <div className="card-title" style={{fontSize:10}}>All-Time PR</div>
              <div style={{fontSize:20,fontWeight:800,color:'var(--green2)',fontFamily:'var(--mono)'}}>{pr?.weight || 0} lb</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>× {pr?.reps || 0} reps</div>
            </div>
            <div className="card" style={{padding:12}}>
              <div className="card-title" style={{fontSize:10}}>Sessions</div>
              <div style={{fontSize:20,fontWeight:800,fontFamily:'var(--mono)'}}>{sorted.length}</div>
            </div>
            <div className="card" style={{padding:12}}>
              <div className="card-title" style={{fontSize:10}}>Total Sets</div>
              <div style={{fontSize:20,fontWeight:800,fontFamily:'var(--mono)'}}>{data.length}</div>
            </div>
          </div>
          <div style={{height:240,position:'relative'}}>
            <canvas ref={canvasRef}/>
          </div>
        </>
      )}
    </Modal>
  );
}

/* ── ACTIVE SESSION VIEW (with rest timer, suggested weight, demos, history, gym mode) ── */
function ActiveSessionView({ state, dispatch, updateSet }) {
  const s = state.activeSession;
  const [timerOpen, setTimerOpen] = useState(false);
  const [timerKey, setTimerKey] = useState(0);
  const [historyEx, setHistoryEx] = useState(null);
  const [voiceMsg, setVoiceMsg] = useState('');
  const restPref = state.restPrefSec || 90;

  const startRest = () => { setTimerKey(k => k+1); setTimerOpen(true); };
  const handleVoice = (parsed) => {
    if (parsed.error) { setVoiceMsg(parsed.error); setTimeout(()=>setVoiceMsg(''), 2500); return; }
    // Inject into first incomplete set across all exercises
    for (let i = 0; i < s.exercises.length; i++) {
      const ex = s.exercises[i];
      for (let j = 0; j < ex.sets.length; j++) {
        if (!ex.sets[j].weight && !ex.sets[j].reps) {
          if (parsed.weight != null) updateSet(i, j, 'weight', String(parsed.weight));
          if (parsed.reps != null) updateSet(i, j, 'reps', String(parsed.reps));
          setVoiceMsg(`Logged ${parsed.weight ?? '?'} × ${parsed.reps ?? '?'} on ${ex.name}`);
          setTimeout(()=>setVoiceMsg(''), 2500);
          startRest();
          return;
        }
      }
    }
    setVoiceMsg('All sets filled — add a new set first');
    setTimeout(()=>setVoiceMsg(''), 2500);
  };

  const markSetDone = (exIdx, setIdx) => {
    const set = s.exercises[exIdx].sets[setIdx];
    if (!set.weight || !set.reps) return;
    updateSet(exIdx, setIdx, 'done', !set.done);
    if (!set.done) startRest(); // only start timer when transitioning to done
  };

  return (
    <div style={{paddingBottom: timerOpen ? 100 : 0}}>
      <div className="page-header">
        <div>
          <div className="page-title">{s.name}</div>
          <div className="page-sub">{s.exercises.length} exercises · Session in progress</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className={`btn btn-sm ${state.gymMode?'btn-primary':'btn-secondary'}`} onClick={()=>dispatch({type:'TOGGLE_GYM_MODE'})} title="Toggle big-button gym mode">
            Gym Mode{state.gymMode ? ' · On' : ''}
          </button>
          <VoiceButton onResult={handleVoice}/>
          <button className="btn btn-danger btn-sm" onClick={() => dispatch({type:'DISCARD_SESSION'})}>Discard</button>
          <button className="btn btn-primary" onClick={() => dispatch({type:'COMPLETE_SESSION'})}>Finish</button>
        </div>
      </div>

      {voiceMsg && (
        <div style={{padding:'10px 16px',background:'var(--green-dim)',border:'1px solid var(--green3)',borderRadius:'var(--radius-sm)',marginBottom:16,fontSize:13,color:'var(--green2)',fontWeight:600}}>
          {voiceMsg}
        </div>
      )}

      {s.exercises.map((ex, exIdx) => {
        const last = getLastBestSet(state.strengthLog, ex.name);
        const suggested = suggestNextWeight(last);
        const demoUrl = getDemoLink(ex.name);
        return (
          <div key={exIdx} className="session-builder" style={{marginBottom:16}}>
            <div className="session-header">
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontWeight:700,fontSize:15,color:'var(--text)'}}>{ex.name}</span>
                  <a href={demoUrl} target="_blank" rel="noopener" className="ex-icon-btn" title="Watch form demo" aria-label="Form demo">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="6,4 20,12 6,20"/></svg>
                  </a>
                  <button className="ex-icon-btn" onClick={()=>setHistoryEx(ex.name)} title="Exercise history" aria-label="Exercise history">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>

                    </div>

        );
      })}

      {timerOpen && (
        <RestTimer
          key={timerKey}
          seconds={restPref}
          onClose={()=>setTimerOpen(false)}

        />
      )}

      {historyEx && (
        <ExerciseHistoryModal exerciseName={historyEx} strengthLog={state.strengthLog} onClose={()=>setHistoryEx(null)}/>
      )}
    </div>
  );
}

/* ── BIG SET ROW (gym mode) ── */
function BigSetRow({ set, setIdx, suggested, onChange, onDone }) {
  const w = parseFloat(set.weight) || (suggested || 0);
  const r = parseInt(set.reps) || 0;
  const inc = (field, by) => onChange(field, String(Math.max(0, (parseFloat(set[field])||0) + by)));
  return (
    <div className={`big-set-row ${set.done?'done':''}`}>
      <div className="big-set-num">SET {setIdx+1}</div>
      <div className="big-set-grid">
        <div className="big-set-col">
          <div className="big-set-label">WEIGHT</div>
          <div className="big-set-ctl">
            <button className="big-set-btn" onClick={()=>inc('weight', -5)}>−</button>
            <input className="big-set-input" type="number" value={set.weight} placeholder={String(suggested||0)} onChange={e=>onChange('weight', e.target.value)}/>
            <button className="big-set-btn" onClick={()=>inc('weight', 5)}>+</button>
          </div>
        </div>
        <div className="big-set-col">
          <div className="big-set-label">REPS</div>
          <div className="big-set-ctl">
            <button className="big-set-btn" onClick={()=>inc('reps', -1)}>−</button>
            <input className="big-set-input" type="number" value={set.reps} placeholder="0" onChange={e=>onChange('reps', e.target.value)}/>
            <button className="big-set-btn" onClick={()=>inc('reps', 1)}>+</button>
          </div>
        </div>
      </div>
      <button className={`big-set-done ${set.done?'done':''}`} onClick={onDone} disabled={!set.weight || !set.reps}>
        {set.done ? 'DONE' : 'TAP TO LOG'}
      </button>
    </div>
  );
}

function WorkoutTracker({ state, dispatch }) {
  const [selectedMuscle, setSelectedMuscle] = useState('chest');
  const [selectedExercises, setSelectedExercises] = useState([]);
  const [sessionName, setSessionName] = useState('');
  const [addModal, setAddModal] = useState(false);
  const [customEx, setCustomEx] = useState('');
  const [presetBanner, setPresetBanner] = useState(null);

  useEffect(() => {
    if (state.pendingSession && !state.activeSession) {
      setSessionName(state.pendingSession.name);
      setSelectedExercises(state.pendingSession.exercises);
      setPresetBanner(state.pendingSession.name);
      dispatch({ type: 'CLEAR_PENDING_SESSION' });
    }
  }, [state.pendingSession]);

  const toggleEx = (name) => {
    setSelectedExercises(prev =>
      prev.includes(name) ? prev.filter(e => e !== name) : [...prev, name]
    );
  };

  const startSession = () => {
    if (!selectedExercises.length) return;
    dispatch({ type:'START_SESSION', name: sessionName || `${selectedMuscle.charAt(0).toUpperCase()+selectedMuscle.slice(1)} Day`, exercises: selectedExercises, muscleGroup: selectedMuscle });
    setSelectedExercises([]);
    setSessionName('');
    setPresetBanner(null);
  };

  const updateSet = (exIdx, setIdx, field, value) =>
    dispatch({ type:'UPDATE_SET', exIdx, setIdx, field, value });

  if (state.activeSession) {
    return <ActiveSessionView state={state} dispatch={dispatch} updateSet={updateSet}/>;
  }

  return (
    <div>
      <div className="page-header">
        <div>

        <div style={{background:'var(--green-dim)',border:'1px solid var(--green3)',borderRadius:'var(--radius)',padding:'14px 18px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between'}}>

            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'var(--green2)',marginBottom:3}}>Today's Recommended Split</div>

            <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Add or remove exercises freely — only today is affected</div>
          </div>
          <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)'}} onClick={()=>{setPresetBanner(null);setSelectedExercises([]);setSessionName('');}}>Clear</button>

      <div className="grid-2" style={{marginBottom:24,gap:24}}>

              {Object.keys(EXERCISE_PRESETS).map(mg => (
                <button key={mg} className={`btn btn-sm ${selectedMuscle===mg?'btn-primary':'btn-secondary'}`} onClick={() => { setSelectedMuscle(mg); setSelectedExercises([]); }} style={{textTransform:'capitalize'}}>

              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>

/* ── COMPONENT: NUTRITION ───────────────────────────── */
function Nutrition({ state, dispatch }) {
  const [addModal, setAddModal]     = useState(null);
  const [customItem, setCustomItem] = useState({ name:'', cal:'', p:'', c:'', f:'' });
  const [goalsModal, setGoalsModal] = useState(false);
  const [goalsDraft, setGoalsDraft] = useState(state.nutritionGoals);
  const [foodSearch, setFoodSearch] = useState('');

  const todayMeals = state.mealLog[TODAY] || { breakfast:[], lunch:[], dinner:[], snacks:[] };
  const macros = sumMacros(todayMeals);
  const water  = state.waterLog[TODAY] || 0;
  const ng     = state.nutritionGoals;
  const customFoods = state.customFoods || [];

  const logPreset = (meal, item) => { dispatch({ type:'LOG_MEAL', meal, item }); setAddModal(null); setFoodSearch(''); };
  const logCustom = (meal) => {
    if (!customItem.name.trim()) return;
    const item = { name: customItem.name, cal:+customItem.cal||0, p:+customItem.p||0, c:+customItem.c||0, f:+customItem.f||0 };
    dispatch({ type:'LOG_MEAL', meal, item });
    setCustomItem({ name:'', cal:'', p:'', c:'', f:'' });
    setAddModal(null);
    setFoodSearch('');
  };
  const saveAndLogCustom = (meal) => {
    if (!customItem.name.trim()) return;
    const item = { name: customItem.name, cal:+customItem.cal||0, p:+customItem.p||0, c:+customItem.c||0, f:+customItem.f||0 };
    dispatch({ type:'SAVE_CUSTOM_FOOD', food: item });
    dispatch({ type:'LOG_MEAL', meal, item });
    setCustomItem({ name:'', cal:'', p:'', c:'', f:'' });
    setAddModal(null);
    setFoodSearch('');
  };

  const filterFoods = (items) => {
    if (!foodSearch.trim()) return items;
    return items.filter(i => i.name.toLowerCase().includes(foodSearch.toLowerCase()));
  };

  const MacroRing = () => {
    const ref = useRef(null);
    const chartRef = useRef(null);
    const remaining = Math.max(0, ng.calories - macros.cal);
    useEffect(() => {
      if (chartRef.current) chartRef.current.destroy();
      chartRef.current = new Chart(ref.current, {
        type:'doughnut',
        data:{ datasets:[{ data:[macros.p*4, macros.c*4, macros.f*9, Math.max(0,remaining)], backgroundColor:['#4E8B47','#3A6B35','#2A4F26','#1a1a1a'], borderWidth:0, hoverOffset:4 }] },
        options:{ cutout:'72%', plugins:{ legend:{ display:false }, tooltip:{ enabled:false } }, animation:{ duration:600 } }
      });
      return () => chartRef.current?.destroy();
    }, [macros.cal, macros.p, macros.c, macros.f]);
    return (
      <div style={{display:'flex',alignItems:'center',gap:24}}>
        <div className="macro-ring-wrap">
          <canvas ref={ref} width="140" height="140"/>
          <div className="macro-ring-center">
            <div className="macro-cal">{macros.cal}</div>
            <div className="macro-sub">kcal</div>
          </div>
        </div>
        <div className="macro-legend">
          {[['#4E8B47','Protein',macros.p+'g',ng.protein+'g'],['#3A6B35','Carbs',macros.c+'g',ng.carbs+'g'],['#2A4F26','Fat',macros.f+'g',ng.fat+'g']].map(([color,label,val,goal])=>(
            <div key={label} className="macro-leg-row">
              <div className="macro-dot" style={{background:color}}/>
              <span className="macro-leg-label">{label}</span>
              <span className="macro-leg-val">{val}<span style={{color:'var(--muted)',fontWeight:400,fontSize:11}}>/{goal}</span></span>
            </div>
          ))}
          <div style={{marginTop:4}}>
            <ProgressBar val={macros.cal} max={ng.calories} label="Calories"/>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Nutrition</div>
          <div className="page-sub">Track meals, macros, and hydration — Goal: {ng.calories} cal / {ng.protein}g protein</div>
        </div>
        <button className="btn btn-secondary" onClick={()=>{ setGoalsDraft(ng); setGoalsModal(true); }}>Goals</button>
      </div>

      <div className="grid-2" style={{marginBottom:24}}>
        <div className="card card-green">
          <div className="card-title">Today's Macros</div>
          <MacroRing/>
        </div>
        <div className="card">
          <div className="card-title">Hydration — {water} / {ng.water} cups</div>
          <div className="water-tracker" style={{marginTop:8}}>
            {Array.from({length:ng.water}).map((_,i) => (
              <button key={i} className={`water-cup ${i<water?'filled':''}`} onClick={()=>dispatch({type:'SET_WATER',cups: i<water?i:i+1})} aria-label={`Cup ${i+1} ${i<water?'full':'empty'}`}>
                <div className="water-fill" style={{height: i<water?'100%':'0%'}}/>
              </button>
            ))}
          </div>
          <div style={{fontSize:13,color:'var(--muted)',marginTop:12}}>
            Click cups to track · {Math.max(0,ng.water-water)} more to hit goal
          </div>
        </div>
      </div>

      {['breakfast','lunch','dinner','snacks'].map(meal => {
        const items = todayMeals[meal] || [];
        const mealCals = items.reduce((a,i)=>a+(i.cal||0),0);
        return (
          <div key={meal} className="meal-section">
            <div className="meal-header">
              <div className="meal-title" style={{color:'var(--text)'}}>{meal.charAt(0).toUpperCase()+meal.slice(1)}</div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                {mealCals>0 && <span className="meal-cals">{mealCals} kcal</span>}
                <button className="btn btn-primary btn-sm" onClick={()=>setAddModal(meal)}>+ Add</button>
              </div>
            </div>
            <div className="meal-body">
              {items.length === 0
                ? <div style={{padding:'14px 16px',color:'var(--muted)',fontSize:13}}>Nothing logged yet — tap + Add</div>
                : items.map((item,idx) => (
                  <div key={idx} className="meal-item">
                    <span className="meal-item-name">{item.name}</span>
                    <div className="meal-item-macros">
                      <span className="meal-macro">{item.cal}cal</span>
                      <span className="meal-macro">{item.p}p</span>
                      <span className="meal-macro">{item.c}c</span>
                      <span className="meal-macro">{item.f}f</span>
                    </div>
                    <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)',padding:'2px 6px'}} onClick={()=>dispatch({type:'REMOVE_MEAL',meal,idx})} aria-label={`Remove ${item.name}`}>x</button>
                  </div>
                ))

            </div>

        );

      {addModal && (
        <Modal title={`Add to ${addModal.charAt(0).toUpperCase()+addModal.slice(1)}`} onClose={()=>{ setAddModal(null); setFoodSearch(''); }}>

          {/* Search */}
          <input
            className="form-input"
            placeholder="Search all foods..."
            value={foodSearch}
            onChange={e=>setFoodSearch(e.target.value)}
            style={{marginBottom:16}}
            autoFocus
          />

          <div style={{maxHeight:340,overflowY:'auto',marginBottom:16,display:'flex',flexDirection:'column',gap:6}}>

            {/* Saved Recipes */}
            {customFoods.length > 0 && (
              <>
                <div className="sec-hdr" style={{marginBottom:4}}><div className="sec-label" style={{color:'var(--green2)'}}>My Saved Recipes</div><div className="sec-line"/></div>
                {filterFoods(customFoods).map((item,i) => (

                    <button className="ex-item" style={{flex:1,textAlign:'left'}} onClick={()=>logPreset(addModal,item)}>
                      <span style={{color:'var(--text)'}}>{item.name}</span>
                      <span style={{color:'var(--muted)',fontSize:11,fontFamily:'var(--mono)'}}>{item.cal} cal · {item.p}p·{item.c}c·{item.f}f</span>
                    </button>
                    <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)',flexShrink:0}} onClick={()=>dispatch({type:'DELETE_CUSTOM_FOOD',idx:i})} aria-label="Delete saved food">x</button>
                  </div>
                ))}
              </>

            {/* Recommended for this meal */}
            {filterFoods(MEAL_PRESETS[addModal]||[]).length > 0 && (
              <>
                <div className="sec-hdr" style={{marginBottom:4}}><div className="sec-label">Recommended — {addModal}</div><div className="sec-line"/></div>

                    <span style={{color:'var(--text)'}}>{item.name}</span>
                    <span style={{color:'var(--muted)',fontSize:11,fontFamily:'var(--mono)'}}>{item.cal} cal · {item.p}p·{item.c}c·{item.f}f</span>
                  </button>

              return (
                <React.Fragment key={mealType}>
                  <div className="sec-hdr" style={{marginBottom:4}}><div className="sec-label">{mealType}</div><div className="sec-line"/></div>
                  {filtered.map((item,i) => (
                    <button key={i} className="ex-item" style={{width:'100%',textAlign:'left'}} onClick={()=>logPreset(addModal,item)}>
                      <span style={{color:'var(--text)'}}>{item.name}</span>
                      <span style={{color:'var(--muted)',fontSize:11,fontFamily:'var(--mono)'}}>{item.cal} cal · {item.p}p·{item.c}c·{item.f}f</span>

          <div className="sec-hdr" style={{marginBottom:10}}><div className="sec-label">Custom Entry</div><div className="sec-line"/></div>

              <label className="form-label">Food Name</label>
              <input className="form-input" placeholder="e.g. Jerk Chicken Bowl..." value={customItem.name} onChange={e=>setCustomItem(p=>({...p,name:e.target.value}))}/>

              <div key={k} className="form-group">

          <div style={{display:'flex',gap:10,marginTop:14}}>
            <button className="btn btn-secondary" style={{flex:1}} onClick={()=>logCustom(addModal)}>Log Only</button>
            <button className="btn btn-primary" style={{flex:2}} onClick={()=>saveAndLogCustom(addModal)}>Save Recipe &amp; Log</button>
          </div>
        </Modal>

      {goalsModal && (
        <Modal title="Nutrition Goals" onClose={()=>setGoalsModal(false)} footer={<>
          <button className="btn btn-secondary" onClick={()=>setGoalsModal(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>{ dispatch({type:'SET_NUTRITION_GOALS',goals:{ calories:+goalsDraft.calories, protein:+goalsDraft.protein, carbs:+goalsDraft.carbs, fat:+goalsDraft.fat, water:+goalsDraft.water }}); setGoalsModal(false); }}>Save</button>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {[['calories','Daily Calories'],['protein','Protein (g)'],['carbs','Carbs (g)'],['fat','Fat (g)'],['water','Water (cups)']].map(([k,lbl])=>(
              <div key={k} className="form-group">

                <input className="form-input" type="number" value={goalsDraft[k]} onChange={e=>setGoalsDraft(p=>({...p,[k]:e.target.value}))}/>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── COMPONENT: MUSCLE MAP ──────────────────────────── */
function MuscleMap({ state, dispatch }) {
  const [view, setView]           = useState('front');
  const [selected, setSelected]   = useState(null);
  const [pickedExs, setPickedExs] = useState([]);

  const selectedMuscle = selected ? MUSCLES.find(m=>m.id===selected) : null;
  const entry          = selected ? state.muscleLog[selected] : null;
  const rec            = selected ? getRecovery(entry) : null;
  const trainedToday   = rec === 'sore';
  const loggedExs      = getMuscleExercises(entry);
  const loggedIntensity= getMuscleIntensity(entry);
  const intensityInfo  = getIntensityLevel(trainedToday ? loggedIntensity : pickedExs.length);

  // When selecting a new muscle, load any previously logged exercises for today
  const handleSelect = (id) => {
    setSelected(id);
    const e = state.muscleLog[id];
    if (e && getRecovery(e) === 'sore') {
      setPickedExs(getMuscleExercises(e));
    } else {
      setPickedExs([]);
    }
  };

  const toggleEx = (ex) => {
    setPickedExs(prev => prev.includes(ex) ? prev.filter(e=>e!==ex) : [...prev, ex]);
  };

  const handleTrain = () => {
    const exs = pickedExs.length > 0 ? pickedExs : [];
    dispatch({ type:'TRAIN_MUSCLE', id:selected, exercises:exs, intensity:Math.min(5, exs.length || 1) });
  };

  const handleUntrain = () => {
    dispatch({ type:'UNTRAIN_MUSCLE', id:selected });
    setPickedExs([]);
  };

  // ── SVG helpers ────────────────────────────────────────
  const getFill = (id) => {
    const r = getRecovery(state.muscleLog[id]);
    if (r==='fresh')    return id===selected ? 'rgba(78,139,71,0.75)' : 'rgba(58,107,53,0.55)';
    if (r==='moderate') return id===selected ? 'rgba(200,137,26,0.65)' : 'rgba(200,137,26,0.45)';
    if (r==='sore')     return id===selected ? 'rgba(231,76,60,0.65)'  : 'rgba(192,57,43,0.45)';
    return id===selected ? '#2a2a2a' : '#1a1a1a';
  };
  const getStroke = (id) => {
    if (id === selected) return '#ffffff';
    const r = getRecovery(state.muscleLog[id]);
    if (r==='fresh')    return '#4E8B47';
    if (r==='moderate') return '#C8891A';
    if (r==='sore')     return '#E74C3C';
    return '#363636';
  };
  const sw = (id) => id===selected ? '2' : '1.5';
  const mp = (id) => ({ className:`muscle-group-path${id===selected?' selected':''}`, style:{cursor:'pointer'}, onClick:()=>handleSelect(id) });

  // ── FRONT BODY SVG ──────────────────────────────────────
  const FrontBody = () => (
    <svg viewBox="0 0 200 500" width="190" height="475" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Front body muscle map">
      <defs>
        <radialGradient id="bodyGrad" cx="50%" cy="38%" r="62%">
          <stop offset="0%" stopColor="#202020"/>
          <stop offset="100%" stopColor="#0e0e0e"/>

/* ── COMPONENT: ICLOUD SYNC CARD ─────────────────── */
function SyncCard({ state, dispatch }) {
  const [importStatus, setImportStatus] = React.useState(null); // 'success' | 'error' | null
  const [confirmImport, setConfirmImport] = React.useState(null); // parsed payload pending confirm
  const importRef = React.useRef(null);

  const handleExport = () => {
    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      device: navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad') ? 'iPhone' : 'Mac',
      data: {
        sessions:       state.sessions,
        muscleLog:      state.muscleLog,
        strengthLog:    state.strengthLog,
        mealLog:        state.mealLog,
        waterLog:       state.waterLog,
        weightLog:      state.weightLog,
        measurements:   state.measurements,
        nutritionGoals: state.nutritionGoals,
        goals:          state.goals,
      }
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `workout-focus-${TODAY}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.data) throw new Error('Invalid file');
        setConfirmImport(parsed);
      } catch {
        setImportStatus('error');
        setTimeout(() => setImportStatus(null), 3000);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const confirmAndImport = () => {
    dispatch({ type: 'IMPORT_DATA', payload: confirmImport.data });
    setConfirmImport(null);
    setImportStatus('success');
    setTimeout(() => setImportStatus(null), 3000);
  };

  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

  return (
    <div className="card" style={{marginTop:24}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div className="card-title" style={{margin:0}}>iCloud Sync</div>

        {importStatus === 'success' && (
          <span style={{fontSize:12,color:'var(--green2)',fontWeight:600}}>Imported successfully</span>
        )}
        {importStatus === 'error' && (
          <span style={{fontSize:12,color:'var(--red)',fontWeight:600}}>Invalid file</span>
        )}
      </div>

      {/* How it works */}
      <div style={{background:'var(--surface2)',borderRadius:10,padding:'12px 14px',marginBottom:16,border:'1px solid var(--border)'}}>
        <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>How to sync</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {[
            ['1', isMobile ? 'Tap Export — save the file to iCloud Drive (Files app)' : 'Click Export — save the .json file to iCloud Drive folder'],
            ['2', isMobile ? 'On your Mac, open the app → Progress → Import' : 'On your iPhone, open the app → Progress → Import'],
            ['3', 'Select the file from iCloud Drive — all your data loads instantly'],
          ].map(([n, text]) => (
            <div key={n} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
              <div style={{width:18,height:18,borderRadius:'50%',background:'var(--green-dim)',border:'1px solid var(--green3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'var(--green2)',flexShrink:0,marginTop:1}}>{n}</div>
              <span style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>{text}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'flex',gap:10}}>
        <button className="btn btn-primary" style={{flex:1}} onClick={handleExport}>
          Export Data
          <span style={{fontSize:11,opacity:0.7,marginLeft:6}}>
            ({state.sessions.length} sessions · {state.weightLog.length} weigh-ins)
          </span>
        </button>
        <button className="btn btn-secondary" style={{flex:1}} onClick={()=>importRef.current?.click()}>
          Import Data
        </button>
        <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={handleFileChange}/>
      </div>

      {/* Confirm import modal */}
      {confirmImport && (
        <Modal title="Replace all data?" onClose={()=>setConfirmImport(null)} footer={<>
          <button className="btn btn-secondary" onClick={()=>setConfirmImport(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={confirmAndImport}>Yes, import</button>
        </>}>
          <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>
            <p>This will replace <strong style={{color:'var(--text)'}}>all data on this device</strong> with the backup from:</p>
            <p style={{marginTop:8,fontFamily:'var(--mono)',fontSize:12,color:'var(--muted)',background:'var(--surface2)',padding:'8px 12px',borderRadius:6}}>
              {new Date(confirmImport.exportedAt).toLocaleString()} · {confirmImport.device}

            <p style={{marginTop:10,color:'var(--muted)',fontSize:12}}>
              Contains {confirmImport.data?.sessions?.length||0} sessions, {confirmImport.data?.weightLog?.length||0} weight entries, {Object.keys(confirmImport.data?.muscleLog||{}).length} muscle records.
            </p>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── COMPONENT: WORKOUT CALENDAR ─────────────────── */
function WorkoutCalendar({ state }) {
  const [calDate, setCalDate]       = useState(new Date());
  const [selectedDay, setSelectedDay] = useState(null);

  const year  = calDate.getFullYear();
  const month = calDate.getMonth();
  const monthLabel = calDate.toLocaleString('default', { month:'long', year:'numeric' });

  // Build 'YYYY-MM-DD' → activity summary map once
  const activityMap = React.useMemo(() => {
    const map = {};
    // Sessions
    state.sessions.forEach(s => {
      if (!s.date) return;
      if (!map[s.date]) map[s.date] = { sessions:[], muscles:[], hasNutrition:false, weight:null };
      map[s.date].sessions.push(s);
    });
    // Muscles trained
    Object.entries(state.muscleLog).forEach(([id, entry]) => {
      const d = getMuscleDate(entry);
      if (!d) return;
      if (!map[d]) map[d] = { sessions:[], muscles:[], hasNutrition:false, weight:null };
      map[d].muscles.push(id);
    });
    // Nutrition
    Object.entries(state.mealLog).forEach(([d]) => {
      if (!map[d]) map[d] = { sessions:[], muscles:[], hasNutrition:false, weight:null };
      map[d].hasNutrition = true;
    });
    // Weight
    state.weightLog.forEach(w => {
      if (!map[w.date]) map[w.date] = { sessions:[], muscles:[], hasNutrition:false, weight:null };
      map[w.date].weight = w.weight;
    });
    return map;
  }, [state.sessions, state.muscleLog, state.mealLog, state.weightLog]);

  // Calendar grid
  const firstDow    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({ day:d, dateStr:ds });
  }

  const selData = selectedDay ? (activityMap[selectedDay] || { sessions:[], muscles:[], hasNutrition:false, weight:null }) : null;

  const MUSCLE_COLORS = {
    chest:'#e74c3c', shoulders:'#3498db', biceps:'#e67e22', triceps:'#9b59b6',
    forearms:'#1abc9c', core:'#f39c12', back:'#2980b9', traps:'#27ae60',
    lowerback:'#c0392b', glutes:'#8e44ad', quads:'#16a085', hamstrings:'#d35400', calves:'#7f8c8d',
  };

  return (
    <div className="card" style={{marginBottom:24}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div className="card-title" style={{margin:0}}>Activity Calendar</div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button className="cal-nav-btn" onClick={()=>setCalDate(new Date(year,month-1,1))}>‹</button>
          <span style={{fontSize:13,fontWeight:700,color:'var(--text)',minWidth:138,textAlign:'center'}}>{monthLabel}</span>
          <button className="cal-nav-btn" onClick={()=>setCalDate(new Date(year,month+1,1))}>›</button>
        </div>
      </div>

      {/* Day-of-week labels */}
      <div className="cal-grid">
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>(
          <div key={d} className="cal-day-label">{d}</div>
        ))}

        {/* Day cells */}
        {cells.map((cell,i)=>{
          if (!cell) return <div key={`e${i}`} className="cal-day cal-empty"/>;
          const a = activityMap[cell.dateStr];
          const isToday    = cell.dateStr === TODAY;
          const isSelected = cell.dateStr === selectedDay;
          const hasAny     = !!a;

          return (
            <div
              key={cell.dateStr}
              className={`cal-day${isToday?' cal-today':''}${isSelected?' cal-selected':''}`}
              onClick={()=>setSelectedDay(isSelected ? null : cell.dateStr)}
            >
              <span className="cal-day-num">{cell.day}</span>
              {hasAny && (
                <div className="cal-dots">
                  {(a.sessions.length>0) && <div className="cal-dot" style={{background:'#4E8B47'}}/>}
                  {(a.muscles.length>0)  && a.muscles.slice(0,3).map(m=>(
                    <div key={m} className="cal-dot" style={{background: MUSCLE_COLORS[m]||'#888'}}/>
                  ))}
                  {a.hasNutrition && <div className="cal-dot" style={{background:'#4488ff'}}/>}
                  {a.weight       && <div className="cal-dot" style={{background:'#aaa'}}/>}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{display:'flex',gap:14,marginTop:14,flexWrap:'wrap'}}>
        {[['#4E8B47','Workout'],['#e67e22','Muscles'],['#4488ff','Nutrition'],['#aaa','Weight']].map(([c,l])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--muted)'}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:c}}/>
            {l}
          </div>
        ))}
      </div>

      {/* Selected day detail panel */}
      {selectedDay && selData && (
        <div className="cal-day-detail">
          <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:12}}>
            {new Date(selectedDay+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
            {selectedDay === TODAY && <span style={{marginLeft:8,fontSize:11,color:'var(--green2)',fontWeight:600}}>· Today</span>}
          </div>

          {selData.sessions.length===0 && selData.muscles.length===0 && !selData.hasNutrition && !selData.weight ? (
            <div style={{color:'var(--muted)',fontSize:13}}>No activity logged this day.</div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {selData.sessions.length>0 && (
                <div>
                  <div className="cal-section-label" style={{color:'#4E8B47'}}>Workout</div>
                  {selData.sessions.map((s,i)=>(
                    <div key={i} style={{fontSize:13,color:'var(--text2)',marginBottom:3}}>
                      <span style={{color:'var(--text)',fontWeight:600}}>{s.name}</span>
                      <span style={{color:'var(--muted)',marginLeft:8}}>
                        {s.exercises.length} exercise{s.exercises.length!==1?'s':''} · {s.exercises.reduce((a,e)=>a+e.sets.length,0)} sets
                      </span>
                    </div>
                  ))}
                </div>
              )}

              {selData.muscles.length>0 && (
                <div>
                  <div className="cal-section-label" style={{color:'#e67e22'}}>Muscles Trained</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {selData.muscles.map(m=>(
                      <span key={m} className="cal-pill" style={{background:MUSCLE_COLORS[m]+'22',color:MUSCLE_COLORS[m],border:`1px solid ${MUSCLE_COLORS[m]}55`}}>
                        {MUSCLES.find(x=>x.id===m)?.label||m}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              {selData.hasNutrition && (()=>{
                const d = state.mealLog[selectedDay]||{};
                const items = [...(d.breakfast||[]),...(d.lunch||[]),...(d.dinner||[]),...(d.snacks||[])];
                const cal = items.reduce((a,b)=>a+(b.calories||0),0);
                const pro = items.reduce((a,b)=>a+(b.protein||0),0);
                return (
                  <div>
                    <div className="cal-section-label" style={{color:'#4488ff'}}>Nutrition</div>
                    <div style={{fontSize:13,color:'var(--text2)'}}>
                      <span style={{color:'var(--text)',fontWeight:600}}>{items.length}</span> meals logged ·{' '}
                      <span style={{color:'var(--text)',fontWeight:600}}>{cal}</span> cal ·{' '}
                      <span style={{color:'#4E8B47',fontWeight:600}}>{pro}g</span> protein
                    </div>

              })()}

              {selData.weight && (
                <div>
                  <div className="cal-section-label" style={{color:'#aaa'}}>Body Weight</div>
                  <div style={{fontSize:13,color:'var(--text2)'}}>
                    <span style={{color:'var(--text)',fontWeight:600,fontFamily:'var(--mono)',fontSize:16}}>{selData.weight}</span>
                    <span style={{color:'var(--muted)',marginLeft:4}}>lbs</span>
                  </div>

              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── INDEXED DB — progress photo storage ────────────── */
const PHOTO_DB = 'wf-photos';
const PHOTO_STORE = 'photos';
function openPhotoDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(PHOTO_DB, 1);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(PHOTO_STORE)) {
        const store = db.createObjectStore(PHOTO_STORE, { keyPath: 'id', autoIncrement: true });
        store.createIndex('date', 'date', { unique: false });
      }
    };
  });
}
async function savePhotoBlob(blob, dateStr, label) {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).add({ blob, date: dateStr, label, created: Date.now() });
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}
async function listPhotos() {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readonly');
    const req = tx.objectStore(PHOTO_STORE).getAll();
    req.onsuccess = () => resolve((req.result || []).sort((a,b)=> a.date.localeCompare(b.date)));
    req.onerror = () => reject(req.error);
  });
}
async function deletePhoto(id) {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).delete(id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

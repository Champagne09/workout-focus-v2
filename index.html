/* ── WEEKLY RECAP — generates a shareable PNG ───────── */
function WeeklyRecap({ state }) {
  const canvasRef = useRef(null);
  const [generated, setGenerated] = useState(false);
  const today = new Date();
  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - 6);
  const weekStart = startOfWeek.toISOString().slice(0,10);
  const weekSessions = state.sessions.filter(s => s.date >= weekStart);
  const totalSets = weekSessions.reduce((a,s)=>a + s.exercises.reduce((b,e)=>b+e.sets.length,0), 0);
  const totalVolume = weekSessions.reduce((acc,s) =>
    acc + s.exercises.reduce((eAcc,e) =>
      eAcc + e.sets.reduce((sAcc,set) => sAcc + ((parseFloat(set.weight)||0) * (parseInt(set.reps)||0)), 0)
    , 0)
  , 0);
  const dates = [...new Set(weekSessions.map(s => s.date))];
  const heaviestSet = weekSessions.flatMap(s => s.exercises.flatMap(e =>
    e.sets.filter(set => set.weight && set.reps).map(set => ({ exercise:e.name, weight:parseFloat(set.weight), reps:parseInt(set.reps) }))
  )).reduce((best, s) => (!best || s.weight > best.weight) ? s : best, null);

  const generate = () => {
    const c = canvasRef.current;
    if (!c) return;
    const W = 1080, H = 1080;
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, '#0e0e0e');
    bg.addColorStop(0.5, '#1a3a18');
    bg.addColorStop(1, '#0e0e0e');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    // Soft green glow
    const glow = ctx.createRadialGradient(W*0.7, H*0.3, 50, W*0.7, H*0.3, 600);
    glow.addColorStop(0, 'rgba(78,139,71,0.35)');
    glow.addColorStop(1, 'rgba(78,139,71,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
    // Header
    ctx.fillStyle = '#4E8B47';
    ctx.font = 'bold 28px Inter, system-ui';
    ctx.fillText('WEEKLY RECAP', 80, 130);
    ctx.fillStyle = '#888';
    ctx.font = '24px Inter, system-ui';
    ctx.fillText(`${weekStart} → ${today.toISOString().slice(0,10)}`, 80, 170);
    // Big number — sessions
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 280px Inter, system-ui';
    ctx.fillText(String(weekSessions.length), 80, 480);
    ctx.fillStyle = '#aaa';
    ctx.font = '36px Inter, system-ui';
    ctx.fillText('sessions this week', 80, 540);
    // Stat grid
    const stats = [
      ['SETS', String(totalSets)],
      ['VOLUME', `${Math.round(totalVolume).toLocaleString()} lb`],
      ['DAYS ACTIVE', String(dates.length)],
      ['STREAK', `${dates.length}/7`],
    ];
    stats.forEach((s, i) => {
      const x = 80 + (i % 2) * 470;
      const y = 660 + Math.floor(i / 2) * 130;
      ctx.fillStyle = '#1a2a18';
      ctx.fillRect(x, y, 430, 110);
      ctx.strokeStyle = 'rgba(78,139,71,0.4)';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, 430, 110);
      ctx.fillStyle = '#4E8B47';
      ctx.font = 'bold 18px Inter, system-ui';
      ctx.fillText(s[0], x + 24, y + 38);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 44px Inter, system-ui';
      ctx.fillText(s[1], x + 24, y + 88);
    });
    // Heaviest set
    if (heaviestSet) {
      ctx.fillStyle = '#4E8B47';
      ctx.font = 'bold 20px Inter, system-ui';
      ctx.fillText('HARDEST SET', 80, 970);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px Inter, system-ui';
      ctx.fillText(`${heaviestSet.exercise} — ${heaviestSet.weight} × ${heaviestSet.reps}`, 80, 1010);
    }
    // Footer
    ctx.fillStyle = '#444';
    ctx.font = '20px Inter, system-ui';
    ctx.fillText('Workout Focus', 80, H - 50);
    setGenerated(true);
  };

  const download = () => {
    const c = canvasRef.current;
    if (!c) return;
    c.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `weekly-recap-${weekStart}.png`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  };

  return (
    <div className="card" style={{marginBottom:24}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <div>
          <div className="card-title" style={{margin:0}}>Weekly Recap</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{weekSessions.length} sessions · {totalSets} sets · {Math.round(totalVolume).toLocaleString()} lb total volume</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-secondary btn-sm" onClick={generate}>Generate Image</button>
          {generated && <button className="btn btn-primary btn-sm" onClick={download}>Download PNG</button>}
        </div>
      </div>
      <canvas ref={canvasRef} style={{width:'100%',maxWidth:400,display:generated?'block':'none',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)'}}/>
    </div>
  );
}

/* ── PHOTO PROGRESS JOURNAL ─────────────────────────── */
function PhotoJournal() {
  const [photos, setPhotos] = useState([]);
  const [busy, setBusy] = useState(false);
  const [compareA, setCompareA] = useState(null);
  const [compareB, setCompareB] = useState(null);
  const [label, setLabel] = useState('front');
  const fileRef = useRef(null);

  const refresh = async () => {
    try {
      const list = await listPhotos();
      // Build object URLs
      const withUrls = list.map(p => ({ ...p, url: URL.createObjectURL(p.blob) }));
      setPhotos(prev => {
        prev.forEach(p => p.url && URL.revokeObjectURL(p.url));
        return withUrls;
      });
    } catch (e) { console.error(e); }
  };
  useEffect(() => { refresh(); return () => photos.forEach(p => p.url && URL.revokeObjectURL(p.url)); }, []);

  const onFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setBusy(true);
    try {
      const dateStr = new Date().toISOString().slice(0,10);
      await savePhotoBlob(file, dateStr, label);
      await refresh();
    } catch (err) { console.error(err); alert('Could not save photo.'); }
    setBusy(false);
    if (fileRef.current) fileRef.current.value = '';
  };

  const remove = async (id) => {
    if (!confirm('Delete this photo?')) return;
    await deletePhoto(id);
    await refresh();
  };

  return (
    <div className="card" style={{marginBottom:24}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <div>
          <div className="card-title" style={{margin:0}}>Progress Photos</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Stored on this device only · {photos.length} {photos.length===1?'photo':'photos'}</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <select className="form-input" style={{width:'auto',padding:'8px 10px',fontSize:13}} value={label} onChange={e=>setLabel(e.target.value)}>
            <option value="front">Front</option>
            <option value="side">Side</option>
            <option value="back">Back</option>
            <option value="flex">Flex</option>
          </select>
          <button className="btn btn-primary btn-sm" onClick={()=>fileRef.current?.click()} disabled={busy}>+ Add Photo</button>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={onFile}/>
        </div>
      </div>

      {photos.length === 0 ? (
        <div style={{padding:'32px 20px',textAlign:'center',color:'var(--muted)',fontSize:13}}>
          Snap a weekly progress pic to build a visual timeline. Photos stay on this device — never uploaded.
        </div>
      ) : (
        <>
          <div className="photo-grid">
            {photos.map(p => (
              <div key={p.id} className="photo-tile">
                <img src={p.url} alt={`${p.label} ${p.date}`}/>
                <div className="photo-meta">
                  <div style={{fontSize:11,fontWeight:700,color:'#fff'}}>{p.date}</div>
                  <div style={{fontSize:10,color:'rgba(255,255,255,0.7)',textTransform:'uppercase'}}>{p.label}</div>
                </div>
                <div className="photo-actions">
                  <button className="btn btn-ghost btn-sm" onClick={()=>setCompareA(p)} style={{color:'#fff',fontSize:11}}>A</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setCompareB(p)} style={{color:'#fff',fontSize:11}}>B</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>remove(p.id)} style={{color:'#E74C3C',fontSize:11}}>×</button>
                </div>
              </div>
            ))}
          </div>
          {compareA && compareB && (
            <div className="photo-compare" style={{marginTop:16}}>
              <div className="photo-compare-pane">
                <img src={compareA.url} alt="A"/>
                <div className="photo-compare-cap">{compareA.date} · {compareA.label}</div>
              </div>
              <div className="photo-compare-pane">
                <img src={compareB.url} alt="B"/>
                <div className="photo-compare-cap">{compareB.date} · {compareB.label}</div>
              </div>
            </div>
          )}
          {(compareA || compareB) && (
            <div style={{marginTop:10,fontSize:11,color:'var(--muted)',textAlign:'center'}}>
              Tap A/B on photos to compare · <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)',fontSize:11,padding:'2px 8px'}} onClick={()=>{setCompareA(null);setCompareB(null);}}>clear</button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function Progress({ state, dispatch }) {
  const [weightInput, setWeightInput] = useState('');
  const [goalsModal, setGoalsModal]   = useState(false);
  const [goalsDraft, setGoalsDraft]   = useState(state.goals);
  const weightChartRef = useRef(null);
  const weightChart    = useRef(null);

  useEffect(() => {
    if (weightChart.current) weightChart.current.destroy();
    const labels = state.weightLog.map(e => fmtDate(e.date));
    const data   = state.weightLog.map(e => e.weight);
    if (!weightChartRef.current || data.length === 0) return;
    weightChart.current = new Chart(weightChartRef.current, {
      type: 'line',
      data: {
        labels,
        datasets:[{ label:'Weight (lbs)', data, borderColor:'#3A6B35', backgroundColor:'rgba(58,107,53,0.12)', borderWidth:2, pointBackgroundColor:'#4E8B47', pointRadius:4, tension:0.3, fill:true }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{
          x:{ ticks:{ color:'#888', font:{size:11} }, grid:{ color:'#1a1a1a' } },
          y:{ ticks:{ color:'#888', font:{size:11} }, grid:{ color:'#1a1a1a' } }
        }
      }
    });
    return () => weightChart.current?.destroy();
  }, [state.weightLog]);

  const prs = Object.entries(state.strengthLog).map(([name, sets]) => {
    const best = sets.reduce((a,b) => (b.weight > a.weight ? b : a), sets[0]);
    return { name, weight: best.weight, reps: best.reps, date: best.date };
  });

  const g = state.goals;

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Progress and Goals</div>
          <div className="page-sub">Track weight, PRs, and long-term targets — Goal: {g.targetWeight ? g.targetWeight+' lbs' : 'Not set'}</div>
        </div>
        <button className="btn btn-secondary" onClick={()=>{ setGoalsDraft(state.goals); setGoalsModal(true); }}>Set Goals</button>
      </div>

      <AchievementsSection state={state}/>
      <WeeklyRecap state={state}/>
      <PhotoJournal/>

      <WorkoutCalendar state={state}/>

      <div className="grid-4" style={{marginBottom:24}}>
        {[['Target Weight', g.targetWeight ? g.targetWeight+' lbs':'Not set', state.weightLog.length ? state.weightLog[state.weightLog.length-1].weight+' lbs current':'No data'],
          ['Bench PR',      g.targetBench    ? g.targetBench+' lbs':'Not set',   prs.find(p=>p.name==='Bench Press')?.weight ? prs.find(p=>p.name==='Bench Press').weight+' lbs current':'Log a session'],
          ['Squat PR',      g.targetSquat    ? g.targetSquat+' lbs':'Not set',   prs.find(p=>p.name==='Back Squat')?.weight ? prs.find(p=>p.name==='Back Squat').weight+' lbs current':'Log a session'],
          ['Deadlift PR',   g.targetDeadlift ? g.targetDeadlift+' lbs':'Not set',prs.find(p=>p.name==='Deadlift')?.weight ? prs.find(p=>p.name==='Deadlift').weight+' lbs current':'Log a session'],
        ].map(([title,target,current])=>(
          <div key={title} className="card">
            <div className="card-title">{title}</div>
            <div className="card-value" style={{fontSize:20,color:'var(--text)'}}>{target}</div>
            <div className="card-sub">{current}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{marginBottom:24}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div className="card-title" style={{margin:0}}>Weight Log</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input className="form-input" style={{width:120,padding:'7px 10px'}} type="number" placeholder="lbs" value={weightInput} onChange={e=>setWeightInput(e.target.value)}/>
            <button className="btn btn-primary btn-sm" onClick={()=>{ if(weightInput){ dispatch({type:'LOG_WEIGHT',weight:+weightInput}); setWeightInput(''); } }}>Log</button>
          </div>
        </div>
        {state.weightLog.length > 0
          ? <div className="chart-wrap"><canvas ref={weightChartRef}/></div>
          : <div style={{padding:'40px 0',textAlign:'center',color:'var(--muted)',fontSize:13}}>No weight logged yet — enter your weight above to start tracking</div>
        }
      </div>

      <div className="card">
        <div className="card-title" style={{marginBottom:16}}>Personal Records</div>
        {prs.length === 0
          ? <div style={{padding:'20px 0',textAlign:'center',color:'var(--muted)',fontSize:13}}>Complete a workout session to see your PRs here</div>
          : <table className="pr-table">
              <thead><tr><th>Exercise</th><th>Best Weight</th><th>Reps</th><th>Date</th></tr></thead>
              <tbody>
                {prs.map((pr,i) => (
                  <tr key={i}>
                    <td style={{color:'var(--text2)'}}>{pr.name}</td>
                    <td>{pr.weight} lbs</td>
                    <td>{pr.reps}</td>
                    <td style={{color:'var(--muted)',fontFamily:'var(--mono)',fontSize:12}}>{fmtDate(pr.date)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
        }
      </div>

      <div className="grid-3" style={{marginTop:24}}>
        <div className="card card-green">
          <div className="card-title">Total Sessions</div>
          <div className="card-value">{state.sessions.length}</div>
          <div className="card-sub">Workouts logged</div>
        </div>
        <div className="card">
          <div className="card-title">Total Sets</div>
          <div className="card-value">{state.sessions.reduce((a,s)=>a+s.exercises.reduce((b,e)=>b+e.sets.length,0),0)}</div>
          <div className="card-sub">Across all sessions</div>
        </div>
        <div className="card">
          <div className="card-title">Exercises Tracked</div>
          <div className="card-value">{Object.keys(state.strengthLog).length}</div>
          <div className="card-sub">Unique lifts logged</div>
        </div>
      </div>

      <SyncCard state={state} dispatch={dispatch}/>

      {goalsModal && (
        <Modal title="Set Your Goals" onClose={()=>setGoalsModal(false)} footer={<>
          <button className="btn btn-secondary" onClick={()=>setGoalsModal(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>{ dispatch({type:'SET_GOALS',goals:goalsDraft}); setGoalsModal(false); }}>Save Goals</button>
        </>}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {[['targetWeight','Target Weight (lbs)'],['targetBodyFat','Target Body Fat (%)'],['targetBench','Bench Press Goal (lbs)'],['targetSquat','Squat Goal (lbs)'],['targetDeadlift','Deadlift Goal (lbs)']].map(([k,lbl])=>(
              <div key={k} className="form-group">
                <label className="form-label">{lbl}</label>
                <input className="form-input" type="number" placeholder="—" value={goalsDraft[k]} onChange={e=>setGoalsDraft(p=>({...p,[k]:e.target.value}))}/>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── COMPONENT: APP ─────────────────────────────────── */
const NAV = [
  { id:'home',     label:'Home',      Icon: IconHome },
  { id:'workout',  label:'Workout',   Icon: IconWorkout },
  { id:'nutrition',label:'Nutrition', Icon: IconNutrition },
  { id:'muscles',  label:'Muscles',   Icon: IconMuscles },
  { id:'progress', label:'Progress',  Icon: IconProgress },
];

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } })();
  const [state, dispatch] = useReducer(reducer, saved || INITIAL_STATE);

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }, [state]);

  const setTab = (tab) => dispatch({ type:'SET_TAB', tab });
  const now = new Date();
  const dateStr = `${DAYS[now.getDay()]} ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  return (
    <div className="app-shell">
      <nav className="sidebar" aria-label="Main navigation">
        <div className="sidebar-logo">
          <h1>Workout Focus</h1>
          <span>Cam's Fitness OS</span>
        </div>
        <ul className="nav-list" role="list">
          {NAV.map(n => (
            <li key={n.id}>
              <button className={`nav-btn ${state.tab===n.id?'active':''}`} onClick={()=>setTab(n.id)} aria-current={state.tab===n.id?'page':undefined}>
                <span className="nav-icon" aria-hidden="true"><n.Icon/></span>
                {n.label}
              </button>
            </li>
          ))}
        </ul>
        <div className="sidebar-footer">
          <div className="sidebar-date">{dateStr}</div>
        </div>
      </nav>

      <main className="main-content" id="main-content" tabIndex="-1">
        {state.tab==='home'      && <Home          state={state} dispatch={dispatch}/>}
        {state.tab==='workout'   && <WorkoutTracker state={state} dispatch={dispatch}/>}
        {state.tab==='nutrition' && <Nutrition     state={state} dispatch={dispatch}/>}
        {state.tab==='muscles'   && <MuscleMap     state={state} dispatch={dispatch}/>}
        {state.tab==='progress'  && <Progress      state={state} dispatch={dispatch}/>}
      </main>

      <nav className="mobile-nav" aria-label="Mobile navigation">
        {NAV.map(n => (
          <button key={n.id} className={`mob-btn ${state.tab===n.id?'active':''}`} onClick={()=>setTab(n.id)} aria-current={state.tab===n.id?'page':undefined}>
            <span className="mob-icon" aria-hidden="true"><n.Icon/></span>
            {n.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {});
  }
</script>
</body>
</html>
